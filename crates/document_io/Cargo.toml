# Embedded Typst PDF export (`typst_compile.rs`/`typst_markup.rs`/`export_pdf_uc.rs`). Off by
# default: zero typst crates are pulled into a plain `cargo build`/`cargo test`. Deliberately
# does NOT enable typst-as-lib's `typst-kit-fonts`/`typst-kit-embed-fonts` — those would pull in
# `typst-kit` + system font scanning + a bundled font corpus, unnecessary since callers always
# supply their own font bytes via `PdfExportOptions::font_bytes`.
