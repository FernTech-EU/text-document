# PDF export (via embedded Typst), behind the `pdf` feature — see [features] below.
# Pinned exactly (`=x.y.z`): typst is pre-1.0 with breaking changes across 0.x bumps, and PDF
# export is golden/snapshot-tested (byte-sensitive), so a bump must be a deliberate, reviewed
# `cargo update -p <crate> --precise X.Y.Z` followed by fixture re-review, never an incidental
# drift from a bare `cargo update`.
typst = { version = "=0.15.0", optional = true }
typst-layout = { version = "=0.15.0", optional = true }
typst-pdf = { version = "=0.15.0", optional = true }
