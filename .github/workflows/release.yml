name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*" # Also match pre-release tags like v1.0.0-beta.1

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Validate the release before creating it
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "text-document") | .version')
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            echo "::error::Update the version in Cargo.toml before tagging."
            exit 1
          fi
          echo "Version validated: $CARGO_VERSION"

      - name: Run tests
        run: cargo test --workspace

  # Build release artifacts for multiple platforms
  build:
    name: Build (${{ matrix.target }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../text-document-${{ matrix.target }}.tar.gz text-document
          cd ../../..

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path text-document.exe -DestinationPath ../../../text-document-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: text-document-${{ matrix.target }}
          path: |
            text-document-*.tar.gz
            text-document-*.zip
          if-no-files-found: error

  # Publish to crates.io
  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: release
    permissions:
      id-token: write
    # Skip for pre-release tags
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Auth for trusted publishing on crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        # `cargo publish --workspace` is NOT resumable: it aborts on the first
        # crate version already on the index, and it can die mid-run with an
        # internal error while crates.io's index catches up after an upload
        # (rust-lang/cargo#17028). To survive both, each attempt excludes the
        # versions already published and retries, so every attempt makes
        # forward progress until nothing is left to publish.
        run: |
          set -uo pipefail

          # True if <name>@<version> is already on the crates.io sparse index.
          crate_published() {
            local name="$1" version="$2" len=${#1} prefix
            if   (( len <= 2 )); then prefix="$len"
            elif (( len == 3 )); then prefix="3/${name:0:1}"
            else prefix="${name:0:2}/${name:2:2}"; fi
            curl -sf "https://index.crates.io/${prefix}/${name}" 2>/dev/null \
              | jq -e --arg v "$version" 'select(.vers == $v)' >/dev/null 2>&1
          }

          mapfile -t CRATES < <(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | "\(.name) \(.version)"')

          for attempt in 1 2 3 4 5; do
            excludes=()
            pending=0
            for entry in "${CRATES[@]}"; do
              name=${entry% *}; version=${entry#* }
              if crate_published "$name" "$version"; then
                excludes+=(--exclude "$name")
              else
                pending=$((pending + 1))
              fi
            done

            if (( pending == 0 )); then
              echo "All crates already published."
              exit 0
            fi

            echo "::group::cargo publish (attempt $attempt, $pending pending)"
            if cargo publish --workspace "${excludes[@]}"; then
              echo "::endgroup::"
              echo "Publish complete."
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; waiting for the index to settle..."
            sleep 60
          done

          echo "::error::cargo publish still failing after 5 attempts."
          exit 1

  # Create the GitHub release
  release:
    name: Create Release
    needs: [build, publish]
    # Run even if publish was skipped (pre-release) but not if it failed
    if: ${{ always() && needs.build.result == 'success' && (needs.publish.result == 'success' || needs.publish.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ -f CHANGELOG.md ]]; then
            sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d' > release_notes.md
            if [[ ! -s release_notes.md ]]; then
              echo "No changelog entry found for version ${VERSION}" > release_notes.md
            fi
          else
            echo "Release ${VERSION}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
