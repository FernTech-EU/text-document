files.extend-exclude = [
  "CHANGELOG.md",
  "tests",
  "crates/cli/src/benchmark_seed.txt",
]
[default.extend-words]
# Acronyms
als = "als"
lits = "lits"
ths = "ths"
wrold = "wrold"
# EPUB Open Packaging Format (content.opf)
opf = "opf"
